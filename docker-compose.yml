version: '3.9'

services:
  db:
    container_name: secure_users_postgres
    image: postgres:15
    environment:
      POSTGRES_DB: secure_users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    name: secure_users_postgres_data
